<!DOCTYPE html>
<html>
<head>
    <title>CORS测试页面</title>
</head>
<body>
    <h1>CORS跨域测试</h1>
    <button onclick="testLogin()">测试登录接口</button>
    <button onclick="testUserInfo()">测试用户信息接口</button>
    <div id="result"></div>

    <script>
        async function testLogin() {
            try {
                const response = await fetch('http://localhost:8080/user/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Origin': 'http://localhost:3000'
                    },
                    body: JSON.stringify({
                        username: 'admin',
                        password: 'admin'
                    })
                });
                
                const data = await response.json();
                document.getElementById('result').innerHTML = '<h3>登录测试结果:</h3><pre>' + JSON.stringify(data, null, 2) + '</pre>';
            } catch (error) {
                document.getElementById('result').innerHTML = '<h3>登录测试失败:</h3><pre>' + error.message + '</pre>';
            }
        }

        async function testUserInfo() {
            try {
                const response = await fetch('http://localhost:8080/user/info', {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                        'Origin': 'http://localhost:3000'
                    }
                });
                
                const data = await response.json();
                document.getElementById('result').innerHTML = '<h3>用户信息测试结果:</h3><pre>' + JSON.stringify(data, null, 2) + '</pre>';
            } catch (error) {
                document.getElementById('result').innerHTML = '<h3>用户信息测试失败:</h3><pre>' + error.message + '</pre>';
            }
        }
    </script>
</body>
</html>
